<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antiderivative Power Practice</title>
  <style>
    :root {
      color-scheme: light;
      --panel: #e9edf7;
      --line: #6174ad;
      --button: #27478f;
      --ink: #3d3d42;
      --border: #8b8d94;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #f6f6f7;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .applet {
      width: min(1180px, 100%);
      border: 2px solid var(--border);
      background: #fff;
      box-shadow: 0 16px 36px rgba(30, 36, 52, 0.12);
      overflow: hidden;
    }

    .top,
    .bottom {
      background: var(--panel);
    }

    .top {
      min-height: 135px;
      display: flex;
      align-items: center;
      padding: 32px 40px;
      border-bottom: 4px solid var(--line);
    }

    .middle {
      min-height: 132px;
      display: flex;
      align-items: center;
      padding: 30px 52px;
      border-bottom: 4px solid var(--line);
      background: #fff;
    }

    .bottom {
      min-height: 132px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px 42px;
      align-items: center;
      padding: 30px 42px;
    }

    button {
      min-height: 56px;
      padding: 10px 22px;
      border: 0;
      border-radius: 7px;
      background: var(--button);
      color: #fff;
      font: 700 clamp(1.2rem, 2.7vw, 1.95rem) Arial, Helvetica, sans-serif;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .problem,
    .answer {
      font: 700 clamp(1.55rem, 3vw, 2.55rem) Georgia, "Times New Roman", serif;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .check-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 320px;
      font: 700 clamp(1.3rem, 2.8vw, 2.05rem) Arial, Helvetica, sans-serif;
    }

    input[type="checkbox"] {
      width: 52px;
      height: 52px;
      accent-color: #6857d2;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .answer {
      min-height: 54px;
      color: #3d3d42;
    }

    .answer[hidden] {
      display: none;
    }

    sup {
      font-size: 0.7em;
      line-height: 0;
    }

    .frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      vertical-align: middle;
      line-height: 1;
      font-style: normal;
    }

    .frac .top-frac {
      width: 100%;
      padding: 0 7px 4px;
      border-bottom: 2px solid currentColor;
      text-align: center;
    }

    .frac .bottom-frac {
      padding: 4px 7px 0;
      text-align: center;
    }

    @media (max-width: 720px) {
      body { padding: 6px; }
      .top,
      .middle,
      .bottom { padding: 22px; }
      .bottom { grid-template-columns: 1fr; }
      .check-wrap { min-width: 0; }
    }
  </style>
</head>
<body>
  <main class="applet" aria-label="Antiderivative power practice applet">
    <section class="top">
      <button id="newQuestion" type="button">Click here for a new question</button>
    </section>
    <section class="middle">
      <div class="problem" id="problem"></div>
    </section>
    <section class="bottom">
      <label class="check-wrap">
        <input id="showAnswer" type="checkbox">
        <span>Show the answer</span>
      </label>
      <div class="answer" id="answer" hidden></div>
    </section>
  </main>

  <script>
    const problem = document.querySelector("#problem");
    const answer = document.querySelector("#answer");
    const showAnswer = document.querySelector("#showAnswer");
    const newQuestion = document.querySelector("#newQuestion");

    const questions = [
      { a: 4, n: 3 },
      { a: 6, n: 2 },
      { a: -5, n: 4 },
      { a: 12, n: 5 },
      { a: -8, n: 1 },
      { a: 9, n: 6 },
      { a: 15, n: 2 },
      { a: -7, n: 3 },
      { a: 10, n: 0 },
      { a: -18, n: 5 },
      { a: 14, n: 3 },
      { a: 20, n: 4 }
    ];

    let current = questions[0];
    let lastIndex = -1;

    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a || 1;
    }

    function coefficientHtml(a, n) {
      if (n === 0) return signedNumber(a);
      if (a === 1) return "";
      if (a === -1) return "-";
      return signedNumber(a);
    }

    function signedNumber(value) {
      return value < 0 ? `-${Math.abs(value)}` : `${value}`;
    }

    function termHtml(a, n) {
      if (n === 0) return signedNumber(a);
      const coeff = coefficientHtml(a, n);
      return `${coeff}x${n === 1 ? "" : `<sup>${n}</sup>`}`;
    }

    function fractionHtml(num, den) {
      if (den === 1) return signedNumber(num);
      const sign = num < 0 ? "-" : "";
      return `${sign}<span class="frac"><span class="top-frac">${Math.abs(num)}</span><span class="bottom-frac">${den}</span></span>`;
    }

    function antiderivativeHtml(a, n) {
      const power = n + 1;
      const d = gcd(a, power);
      const num = a / d;
      const den = power / d;
      const coeff = fractionHtml(num, den);
      if (power === 1) return `${coeff}x + C`;
      if (coeff === "1") return `x<sup>${power}</sup> + C`;
      if (coeff === "-1") return `-x<sup>${power}</sup> + C`;
      return `${coeff}x<sup>${power}</sup> + C`;
    }

    function render() {
      problem.innerHTML = `If f′(x) = ${termHtml(current.a, current.n)}, find a possible expression for f(x).`;
      answer.innerHTML = `f(x) = ${antiderivativeHtml(current.a, current.n)}`;
      answer.hidden = !showAnswer.checked;
    }

    function nextQuestion() {
      let index = Math.floor(Math.random() * questions.length);
      if (questions.length > 1) {
        while (index === lastIndex) index = Math.floor(Math.random() * questions.length);
      }
      lastIndex = index;
      current = questions[index];
      showAnswer.checked = false;
      render();
    }

    showAnswer.addEventListener("change", render);
    newQuestion.addEventListener("click", nextQuestion);

    current = questions[0];
    lastIndex = 0;
    render();
  </script>
</body>
</html>
